# ── haitrieuai.com (miu-card-visit) ──────────────────────────────────────────
# Cloudflare terminates TLS — nginx chỉ nhận HTTP từ Cloudflare edge.
# Upstream: container `miu-card-visit:3000` trên proxy-net.

server {
    listen 80;
    server_name haitrieuai.com www.haitrieuai.com;

    # Trust Cloudflare real IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    client_max_body_size 5m;

    # Redirect www → apex (CF cũng làm được nhưng giữ ở nginx cho an toàn)
    if ($host = www.haitrieuai.com) {
        return 301 https://haitrieuai.com$request_uri;
    }

    # Next.js static assets — cache lâu vì filename có hash
    location /_next/static/ {
        proxy_pass http://miu-card-visit:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=web burst=30 nodelay;
        proxy_pass         http://miu-card-visit:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
