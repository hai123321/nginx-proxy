# ── miuvis.miushop.io.vn ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name miuvis.miushop.io.vn;

    # location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name miuvis.miushop.io.vn;

    ssl_certificate     /home/deploy/work/nginx-proxy/cert/cert.pem;
    ssl_certificate_key /home/deploy/work/nginx-proxy/cert/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location / {
        limit_req zone=web burst=50 nodelay;
        proxy_pass         http://miuvis-app-1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
