# ── miushop.io.vn (e-com frontend) ───────────────────────────────────────────
server {
    listen 80;
    server_name miushop.io.vn www.miushop.io.vn;

    # location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://miushop.io.vn$request_uri; }
}

server {
    listen 443 ssl;
    server_name miushop.io.vn www.miushop.io.vn;

    ssl_certificate     /etc/nginx/cert/cert.pem;
    ssl_certificate_key /etc/nginx/cert/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    if ($host = www.miushop.io.vn) { return 301 https://miushop.io.vn$request_uri; }

    location /_next/static/ {
        proxy_pass http://e-com-frontend-1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=web burst=50 nodelay;
        proxy_pass         http://e-com-frontend-1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── api.miushop.io.vn (e-com backend) ────────────────────────────────────────
server {
    listen 80;
    server_name api.miushop.io.vn;

    # location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name api.miushop.io.vn;

    ssl_certificate     /etc/nginx/cert/cert.pem;
    ssl_certificate_key /etc/nginx/cert/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://e-com-api-1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / { return 404; }
}
