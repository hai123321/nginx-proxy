name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Traefik static config
        run: |
          docker run --rm \
            -v "$PWD/traefik/traefik.yml:/etc/traefik/traefik.yml:ro" \
            -v "$PWD/traefik/conf.d:/etc/traefik/conf.d:ro" \
            traefik:v3.3 traefik healthcheck --ping 2>/dev/null || \
          docker run --rm \
            -v "$PWD/traefik/traefik.yml:/etc/traefik/traefik.yml:ro" \
            traefik:v3.3 traefik version

      - name: Validate YAML syntax (conf.d)
        run: |
          docker run --rm \
            -v "$PWD/traefik/conf.d:/data:ro" \
            mikefarah/yq:4 eval 'true' \
              /data/middlewares.yml \
              /data/miushop.yml \
              /data/card.yml \
              /data/brain-api.yml

      - name: Deploy Traefik
        run: |
          # --force-recreate so changes in bind-mounted traefik.yml (static
          # config) actually take effect; conf.d hot-reloads on its own.
          docker compose up -d --remove-orphans --force-recreate

      - name: Health check
        run: |
          sleep 5
          docker compose ps
          docker compose logs --tail=20

      - name: Xoá image cũ
        run: docker image prune -f
