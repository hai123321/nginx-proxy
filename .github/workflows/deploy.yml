name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, miu-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate nginx config
        run: |
          docker run --rm \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/nginx/conf.d:/etc/nginx/conf.d:ro" \
            nginx:1.27-alpine nginx -t

      - name: Deploy nginx
        run: |
          docker compose down
          docker compose up -d

      - name: Xoá image cũ
        run: docker image prune -f
