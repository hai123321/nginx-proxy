<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am Iron Man</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
  user-select: none;
}

canvas#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(24px, 5vw, 48px);
  padding: 20px;
}

/* ── MASK ── */
.mask-wrap {
  filter: drop-shadow(0 0 40px rgba(180, 0, 0, 0.6))
          drop-shadow(0 0 80px rgba(120, 0, 0, 0.3));
  animation: maskFloat 4s ease-in-out infinite;
}

@keyframes maskFloat {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

svg.mask {
  width: min(260px, 62vw);
  height: auto;
}

/* eyes */
@keyframes eyeFlicker {
  0%, 92%, 96%, 100% { opacity: 1; }
  94%                 { opacity: 0.4; }
}

@keyframes eyePulse {
  0%, 100% { filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 18px #4fc3f7) drop-shadow(0 0 30px #0277bd); }
  50%       { filter: drop-shadow(0 0 14px #fff) drop-shadow(0 0 36px #4fc3f7) drop-shadow(0 0 60px #01579b); }
}

.eye {
  animation: eyePulse 2s ease-in-out infinite, eyeFlicker 7s ease-in-out infinite;
}
.eye.r { animation-delay: 0.08s, 0.3s; }

/* arc reactor */
@keyframes reactorGlow {
  0%, 100% { filter: drop-shadow(0 0 8px #4fc3f7) drop-shadow(0 0 20px #0288d1); opacity: 0.85; }
  50%       { filter: drop-shadow(0 0 18px #80d8ff) drop-shadow(0 0 45px #0288d1) drop-shadow(0 0 70px #4fc3f7); opacity: 1; }
}
@keyframes reactorSpin {
  to { transform: rotate(360deg); }
}

.reactor-glow { animation: reactorGlow 1.8s ease-in-out infinite; }
.reactor-ring { animation: reactorSpin 3s linear infinite; transform-origin: 150px 318px; }

/* ── TEXT ── */
.text-block { text-align: center; }

.subtitle {
  color: #ef5350;
  font-size: clamp(10px, 2.8vw, 15px);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(239,83,80,0.9), 0 0 30px rgba(183,28,28,0.5);
  margin-bottom: 10px;
  animation: subtitlePulse 3s ease-in-out infinite;
}

@keyframes subtitlePulse {
  0%, 100% { opacity: 0.8; }
  50%       { opacity: 1; }
}

.title {
  color: #fff;
  font-size: clamp(36px, 11vw, 80px);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.9;
  letter-spacing: 0.04em;
  text-shadow: 0 0 30px rgba(255,255,255,0.25), 0 3px 6px rgba(0,0,0,0.9);
}

.title .red {
  color: #ef5350;
  text-shadow: 0 0 20px rgba(239,83,80,0.7), 0 0 50px rgba(183,28,28,0.4);
}

/* ── HUD overlay ── */
.hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.hud-corner {
  position: absolute;
  width: 36px;
  height: 36px;
  border-color: rgba(239,83,80,0.35);
  border-style: solid;
}
.hud-corner.tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
.hud-corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
.hud-corner.bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
.hud-corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

.hud-scan {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(79,195,247,0.5) 30%, rgba(79,195,247,0.9) 50%, rgba(79,195,247,0.5) 70%, transparent);
  animation: hudScan 6s linear infinite;
}
@keyframes hudScan {
  0%   { top: 0; opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.8; }
  100% { top: 100%; opacity: 0; }
}

.hud-label {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(239,83,80,0.4);
  font-size: 9px;
  letter-spacing: 0.35em;
  font-family: monospace;
  white-space: nowrap;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="hud">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>
  <div class="hud-scan"></div>
  <div class="hud-label">STARK INDUSTRIES &nbsp;·&nbsp; MARK L &nbsp;·&nbsp; SYSTEM ONLINE</div>
</div>

<div class="scene">

  <div class="mask-wrap">
    <svg class="mask" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gFace" cx="50%" cy="38%" r="58%">
          <stop offset="0%" stop-color="#e53935"/>
          <stop offset="75%" stop-color="#b71c1c"/>
          <stop offset="100%" stop-color="#6a0000"/>
        </radialGradient>
        <radialGradient id="gSide" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c62828"/>
          <stop offset="100%" stop-color="#7f0000"/>
        </radialGradient>
        <radialGradient id="gEye" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#b3e5fc"/>
          <stop offset="100%" stop-color="#0288d1"/>
        </radialGradient>
        <radialGradient id="gReactor" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#e3f2fd"/>
          <stop offset="45%" stop-color="#4fc3f7"/>
          <stop offset="100%" stop-color="#0277bd"/>
        </radialGradient>
        <filter id="fEye" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fReactor" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ── OUTER SHELL ── -->
      <path d="M150 4 L245 46 L278 128 L270 225 L232 300 L150 348 L68 300 L30 225 L22 128 L55 46 Z"
            fill="url(#gFace)" stroke="#3a0000" stroke-width="1.5"/>

      <!-- ── FOREHEAD ── -->
      <path d="M150 4 L205 36 L200 72 L150 82 L100 72 L95 36 Z"
            fill="#c62828" stroke="#8b0000" stroke-width="1"/>
      <line x1="150" y1="4" x2="150" y2="82" stroke="#8b0000" stroke-width="2.5"/>
      <path d="M108 52 L150 42 L192 52" stroke="#f9a825" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- ── TEMPLES ── -->
      <path d="M55 46 L95 36 L100 72 L72 108 L45 120 Z"  fill="#b71c1c" stroke="#7f0000" stroke-width="1"/>
      <path d="M245 46 L205 36 L200 72 L228 108 L255 120 Z" fill="#b71c1c" stroke="#7f0000" stroke-width="1"/>

      <!-- ── CHEEKS ── -->
      <path d="M22 128 L45 120 L72 108 L82 168 L65 215 L30 225 Z"
            fill="url(#gSide)" stroke="#7f0000" stroke-width="1"/>
      <path d="M278 128 L255 120 L228 108 L218 168 L235 215 L270 225 Z"
            fill="url(#gSide)" stroke="#7f0000" stroke-width="1"/>

      <!-- ── LOWER FACE ── -->
      <path d="M30 225 L65 215 L82 168 L218 168 L235 215 L270 225 L232 300 L150 348 L68 300 Z"
            fill="url(#gFace)" stroke="#6a0000" stroke-width="1"/>

      <!-- ── EYE SOCKETS ── -->
      <path d="M80 120 L140 104 L148 130 L133 155 L80 152 Z" fill="#150000"/>
      <path d="M220 120 L160 104 L152 130 L167 155 L220 152 Z" fill="#150000"/>

      <!-- ── EYE SLITS ── -->
      <path class="eye l" d="M83 124 L137 109 L144 132 L129 151 L83 148 Z"
            fill="url(#gEye)" filter="url(#fEye)"/>
      <path class="eye r" d="M217 124 L163 109 L156 132 L171 151 L217 148 Z"
            fill="url(#gEye)" filter="url(#fEye)"/>

      <!-- ── NOSE GUARD ── -->
      <path d="M142 155 L158 155 L162 188 L155 200 L145 200 L138 188 Z"
            fill="#8b0000" stroke="#5a0000" stroke-width="1"/>

      <!-- ── MOUTH PANEL ── -->
      <path d="M95 215 L205 215 L214 252 L202 282 L150 300 L98 282 L86 252 Z"
            fill="#c62828" stroke="#7f0000" stroke-width="1"/>
      <line x1="108" y1="228" x2="192" y2="228" stroke="#7f0000" stroke-width="1.5"/>
      <line x1="106" y1="241" x2="194" y2="241" stroke="#7f0000" stroke-width="1.5"/>
      <line x1="109" y1="254" x2="191" y2="254" stroke="#7f0000" stroke-width="1.5"/>
      <line x1="113" y1="267" x2="187" y2="267" stroke="#7f0000" stroke-width="1.2"/>

      <!-- ── GOLD ACCENTS ── -->
      <path d="M65 215 L82 168 L90 200 L86 252" stroke="#f9a825" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M235 215 L218 168 L210 200 L214 252" stroke="#f9a825" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M102 285 L150 298 L198 285" stroke="#f9a825" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- ── ARC REACTOR ── -->
      <g class="reactor-glow" filter="url(#fReactor)">
        <circle cx="150" cy="318" r="16" fill="none" stroke="#0288d1" stroke-width="1.5" opacity="0.7"/>
        <circle cx="150" cy="318" r="10" fill="url(#gReactor)" opacity="0.95"/>
        <circle cx="150" cy="318" r="4" fill="#e3f2fd"/>
      </g>
      <g class="reactor-ring">
        <rect x="149" y="299" width="2" height="5" rx="1" fill="#4fc3f7" opacity="0.9"/>
        <rect x="149" y="332" width="2" height="5" rx="1" fill="#4fc3f7" opacity="0.9"/>
        <rect x="132" y="317" width="5" height="2" rx="1" fill="#4fc3f7" opacity="0.9"/>
        <rect x="163" y="317" width="5" height="2" rx="1" fill="#4fc3f7" opacity="0.9"/>
      </g>
    </svg>
  </div>

  <div class="text-block">
    <div class="subtitle">Tony Stark</div>
    <div class="title">I&nbsp;am <span class="red">Iron</span><br>Man</div>
  </div>

</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = Array.from({ length: 55 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.4 + 0.3,
  vx: (Math.random() - 0.5) * 0.25,
  vy: (Math.random() - 0.5) * 0.25,
  alpha: Math.random() * 0.45 + 0.1,
  hue: Math.random() > 0.65 ? 200 : 0
}));

function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.hue === 0 ? `rgba(239,83,80,${p.alpha})` : `rgba(79,195,247,${p.alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(tick);
}
tick();

document.querySelector('.mask-wrap').addEventListener('click', () => {
  document.querySelectorAll('.eye').forEach(el => {
    el.style.filter = 'drop-shadow(0 0 22px #fff) drop-shadow(0 0 60px #4fc3f7) brightness(2)';
    setTimeout(() => { el.style.filter = ''; }, 300);
  });
});
</script>

</body>
</html>
